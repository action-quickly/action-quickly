name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号，留空则从 Cargo.toml 读取'
        required: false
        type: string

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            binary-ext: .exe
          - platform: macos-latest
            target: x86_64-apple-darwin
            binary-ext: ''
          - platform: macos-latest
            target: aarch64-apple-darwin
            binary-ext: ''

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Read version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build and bundle
        uses: tauri-apps/tauri-action@v1
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ steps.version.outputs.version }}
          releaseName: 'v${{ steps.version.outputs.version }}'
          releaseBody: 'ActionQuick v${{ steps.version.outputs.version }}'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload raw binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.tauri.outputs.releaseUploadUrl }}
          asset_path: src-tauri/target/${{ matrix.target }}/release/action-quick${{ matrix.binary-ext }}
          asset_name: action-quick-${{ matrix.target }}${{ matrix.binary-ext }}
          asset_content_type: application/octet-stream
